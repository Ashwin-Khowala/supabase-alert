name: Publish to JSR

on:
  push:
    branches:
      - master   # publish on every push to master

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest

    # Required for JSR OIDC token exchange — no API key needed
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # -----------------------------------------------------------------------
      # Run CI checks before publishing
      # -----------------------------------------------------------------------
      - name: Lint
        run: deno lint

      - name: Type check
        run: |
          deno check packages/core/mod.ts
          deno check packages/cli/mod.ts

      - name: Run tests
        run: deno test --allow-net --allow-env --allow-read --allow-write packages/

      # -----------------------------------------------------------------------
      # Publish @ashwinkh/supabase-alerts
      # -----------------------------------------------------------------------
      - name: Publish core to JSR
        run: deno publish
        working-directory: packages/core

      # -----------------------------------------------------------------------
      # Publish @ashwinkh/supabase-alerts-cli
      # -----------------------------------------------------------------------
      - name: Publish cli to JSR
        run: deno publish
        working-directory: packages/cli
